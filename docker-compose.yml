volumes:
  pg_data:
  static:
  media:

services:
  db_1:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data
  backend:
    build: ./backend/
    env_file: .env
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             mkdir -p /static/static &&
             cp -r /app/collected_static/. /static/static/ &&
             gunicorn --bind 0.0.0.0:9000 kittygram_backend.wsgi"
    volumes:
      - static:/static
      - media:/app/media
    depends_on:
      - db_1
  frontend:
    env_file: .env
    build: ./frontend/
    command: cp -r /app/build/. /static/
    volumes:
      - static:/static
  gateway:
    build: ./nginx/
    env_file: .env
    volumes:
      - static:/static
      - media:/app/media
    ports:
      - 9000:80
    depends_on:
      - backend
